<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Регистрация — K&K Clothing</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Montserrat',sans-serif;background:#000;color:#fff;line-height:1.6}
    a{text-decoration:none;color:inherit}
    .container{width:90%;max-width:1200px;margin:0 auto}

    header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:linear-gradient(180deg,rgba(0,0,0,0.6),rgba(0,0,0,0.35));border-bottom:1px solid rgba(255,255,255,0.03);position:sticky;top:0;z-index:99}
    .logo{font-weight:800;color:#DC143C;font-size:1.8em;letter-spacing:2px}
    nav{display:flex;align-items:center;gap:14px}
    nav ul{display:flex;list-style:none;gap:12px;align-items:center}
    nav a,.dropdown-toggle{padding:6px 8px;border-radius:8px;font-weight:600;color:rgba(255,255,255,0.92)}
    nav a:hover,.dropdown-toggle:hover{background:rgba(255,255,255,0.02);color:#fff}

    /* Cart & profile actions in nav */
    .nav-actions{display:flex;align-items:center;gap:10px;margin-left:6px}
    .nav-actions a{display:inline-flex;align-items:center;justify-content:center;padding:8px;border-radius:8px;color:rgba(255,255,255,0.92);font-weight:700}
    .nav-actions a:hover{background:rgba(255,255,255,0.02);color:#fff}

    .dropdown{position:relative}
    .dropdown-toggle{background:transparent;border:none;cursor:pointer}
    .dropdown-toggle:after{content:'▾';margin-left:6px;font-size:.72em}
    .dropdown-menu{position:absolute;top:calc(100% + 8px);left:0;min-width:160px;background:#0b0b0b;border:1px solid rgba(255,255,255,0.04);border-radius:10px;display:none;flex-direction:column;padding:6px 0;box-shadow:0 12px 40px rgba(0,0,0,0.6);z-index:1000}
    .dropdown.open .dropdown-menu{display:flex}
    .dropdown-menu a{padding:10px 14px;color:#e6e6e6;font-weight:600}
    .dropdown-menu a:hover{background:rgba(255,255,255,0.02);color:#fff}

    .search-container{display:flex;align-items:center;background:rgba(255,255,255,0.02);padding:6px 8px;border-radius:999px}
    .search-input{width:0;padding:8px 12px;border:none;border-radius:999px;background:transparent;color:#fff;outline:none;transition:width .28s}
    .search-input.active{width:210px}
    .search-icon{cursor:pointer;margin-left:8px}

    .page-hero{min-height:30vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:36px 20px;background:linear-gradient(180deg,rgba(0,0,0,0.6),rgba(0,0,0,0.6));}
    .page-hero h1{font-size:2rem}
    .page-hero p{color:#cfcfcf;margin-top:8px}

    .auth-wrap{display:flex;justify-content:center;padding:36px 20px}
    .auth-card{width:100%;max-width:640px;background:linear-gradient(180deg,#0f0f0f,#0b0b0b);border:1px solid rgba(255,255,255,0.04);padding:28px;border-radius:12px;box-shadow:0 18px 50px rgba(0,0,0,0.6)}
    .auth-card h2{margin-bottom:8px}
    .auth-card p.lead{color:#d0d0d0;margin-bottom:18px}

    form.auth-form{display:flex;flex-direction:column;gap:12px}
    .row { display:flex; gap:12px; }
    .col { flex:1 }
    input[type="text"], input[type="email"], input[type="password"]{padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:#fff;outline:none}
    .field-row{display:flex;gap:8px;align-items:center}
    .remember{display:flex;align-items:center;gap:8px;color:#d0d0d0}
    .auth-submit{padding:12px 18px;border-radius:999px;border:none;background:linear-gradient(90deg,#ff7b86,#DC143C);color:#fff;font-weight:700;cursor:pointer}

    /* password toggle stable */
    .toggle-pass { width:40px;height:38px;min-width:40px;display:inline-flex;align-items:center;justify-content:center;padding:0;background:rgba(255,255,255,0.03);border-radius:8px;border:none;color:#fff;cursor:pointer;transition:background .12s ease; }
    .toggle-pass:focus{outline:none;box-shadow:0 0 0 3px rgba(220,20,60,0.12)}
    .toggle-pass .icon-off{display:none}
    .toggle-pass[aria-pressed="true"] .icon-on{display:none}
    .toggle-pass[aria-pressed="true"] .icon-off{display:inline}

    /* New: label style for form fields and prominent secondary login link */
    .field-label{display:block;color:#cfcfcf;font-weight:700;margin-bottom:6px;font-size:0.92em}
    .auth-secondary{display:inline-block;margin-left:8px;padding:10px 14px;border-radius:999px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:#fff;font-weight:700;text-decoration:none;transition:all .12s ease}
    .auth-secondary:hover{background:rgba(255,255,255,0.03);transform:translateY(-2px)}
    .auth-secondary:focus{outline:none;box-shadow:0 0 0 3px rgba(220,20,60,0.12)}

    footer{padding:28px 20px;background:linear-gradient(180deg,#070707,#0b0b0b);color:#cfcfcf;margin-top:30px}
    footer .footer-bottom{max-width:1200px;margin:0 auto;text-align:center;color:#9e9e9e}

    @media(max-width:720px){ .row{flex-direction:column} .auth-card{padding:18px} }
  </style>
</head>
<body>
  <header>
    <div class="logo">K&K</div>
    <nav>
      <ul>
        <li><a href="startingPage.html">Начало</a></li>
        <li class="dropdown">
          <button class="dropdown-toggle" id="clothesToggle" aria-expanded="false" aria-controls="clothesMenu">Дрехи</button>
          <div class="dropdown-menu" id="clothesMenu" role="menu" aria-labelledby="clothesToggle">
            <a href="menClothing.html#men" role="menuitem">Мъже</a>
            <a href="startingPage.html#women" role="menuitem">Жени</a>
            <a href="startingPage.html#kids" role="menuitem">Деца</a>
          </div>
        </li>
        <li><a href="contact.html">Контакт</a></li>
        <li><a href="aboutUs.html">За нас</a></li>
      </ul>

      <div class="nav-actions" aria-hidden="false">
        <a href="cart.html" class="icon-link" title="Кошница" aria-label="Кошница">🛒</a>
        <a href="profile.html" class="icon-link" title="Профил" aria-label="Профил">👤</a>
      </div>

      <div class="search-container">
        <input class="search-input" placeholder="Търси...">
        <div class="search-icon" id="searchToggle" title="Търси">🔍</div>
      </div>
    </nav>
  </header>

  <section class="page-hero">
    <div class="container">
      <h1>Създайте акаунт</h1>
      <p>Регистрирайте се, за да направите поръчки по-бързо и да проследявате статуса им.</p>
    </div>
  </section>

  <section class="auth-wrap">
    <div class="auth-card container">
      <h2>Регистрация</h2>
      <p class="lead">Попълнете кратката форма, за да създадете профил.</p>

      <form class="auth-form" id="registerForm">
        <div class="row">
          <div class="col">
            <input type="text" id="firstName" placeholder="Име" required />
          </div>
          <div class="col">
            <input type="text" id="lastName" placeholder="Фамилия" required />
          </div>
        </div>

        <!-- Username field required for API createUser -->
        <label class="field-label" for="username">Потребителско име</label>
        <input type="text" id="username" name="username" autocomplete="username" placeholder="Потребителско име" required />

        <!-- Replace simple email input with labeled input that has name and autocomplete -->
        <label class="field-label" for="regEmail">Имейл</label>
        <input type="email" id="regEmail" name="email" autocomplete="email" placeholder="you@example.com" required />

        <div class="field-row">
          <input type="password" id="regPassword" placeholder="Парола (мин. 8 символа)" required />
          <button type="button" class="toggle-pass" id="toggleRegPass" aria-pressed="false" aria-label="Покажи паролата">
            <span class="icon-on" aria-hidden>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </span>
            <span class="icon-off" aria-hidden>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a20.6 20.6 0 0 1 5.06-5.94"></path><path d="M1 1l22 22"></path><path d="M9.88 9.88A3 3 0 0 0 14.12 14.12"></path></svg>
            </span>
          </button>
        </div>

        <div class="field-row">
          <input type="password" id="regPassword2" placeholder="Потвърдете паролата" required />
          <button type="button" class="toggle-pass" id="toggleRegPass2" aria-pressed="false" aria-label="Покажи паролата">
            <span class="icon-on" aria-hidden>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </span>
            <span class="icon-off" aria-hidden>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a20.6 20.6 0 0 1 5.06-5.94"></path><path d="M1 1l22 22"></path><path d="M9.88 9.88A3 3 0 0 0 14.12 14.12"></path></svg>
            </span>
          </button>
        </div>

        <label class="remember"><input type="checkbox" id="terms" required> Съгласен съм с <a href="#">Условията</a> и <a href="#">Политиката за поверителност</a></label>

        <div id="regError" class="error" role="alert" style="display:none"></div>

        <button type="submit" class="auth-submit">Създай профил</button>

        <p style="margin-top:12px;color:#cfcfcf">Вече имате акаунт? <a class="auth-secondary" href="loginPage.html" aria-label="Вход към профил">Вход</a></p>
      </form>
    </div>
  </section>

  <footer>
    <div class="footer-bottom">&copy; 2024 K&K Clothing. Всички права запазени.</div>
  </footer>

  <script src="cartApi.js"></script>
  <script>
    // search toggle
    const searchToggle = document.getElementById('searchToggle');
    const searchInput = document.querySelector('.search-input');
    if (searchToggle) { searchToggle.addEventListener('click', () => { searchInput.classList.toggle('active'); if (searchInput.classList.contains('active')) searchInput.focus(); else searchInput.value = ''; }); }

    // dropdown
    const clothesToggle = document.getElementById('clothesToggle');
    if (clothesToggle) {
      clothesToggle.addEventListener('click', () => { const parent = clothesToggle.parentElement; const isOpen = parent.classList.toggle('open'); clothesToggle.setAttribute('aria-expanded', isOpen); });
      document.addEventListener('click', (e) => { const dd = document.querySelector('.dropdown'); if (!dd) return; if (!dd.contains(e.target)) { dd.classList.remove('open'); clothesToggle.setAttribute('aria-expanded','false'); } });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { const dd = document.querySelector('.dropdown'); if (dd) { dd.classList.remove('open'); clothesToggle.setAttribute('aria-expanded','false'); clothesToggle.focus(); } } });
    }

    // password toggles
    const toggleRegPass = document.getElementById('toggleRegPass');
    const toggleRegPass2 = document.getElementById('toggleRegPass2');
    const regPassword = document.getElementById('regPassword');
    const regPassword2 = document.getElementById('regPassword2');
    [ [toggleRegPass, regPassword], [toggleRegPass2, regPassword2] ].forEach(([btn, input]) => {
      if (!btn || !input) return;
      btn.addEventListener('click', () => {
        const showing = input.type === 'password';
        input.type = showing ? 'text' : 'password';
        btn.setAttribute('aria-pressed', showing ? 'true' : 'false');
        btn.setAttribute('aria-label', showing ? 'Скрий паролата' : 'Покажи паролата');
      });
    });

    // registration validation
    const registerForm = document.getElementById('registerForm');
    const regError = document.getElementById('regError');
    if (registerForm) {
      registerForm.addEventListener('submit', (e) => {
        e.preventDefault();
        regError.style.display = 'none';
        const first = document.getElementById('firstName').value.trim();
        const last = document.getElementById('lastName').value.trim();
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const pw = regPassword.value.trim();
        const pw2 = regPassword2.value.trim();
        const terms = document.getElementById('terms').checked;
        if (!first || !last || !username || !email || !pw || !pw2) { regError.textContent = 'Моля попълнете всички задължителни полета.'; regError.style.display = 'block'; return; }
        if (pw.length < 8) { regError.textContent = 'Паролата трябва да е поне 8 символа.'; regError.style.display = 'block'; return; }
        if (pw !== pw2) { regError.textContent = 'Паролите не съвпадат.'; regError.style.display = 'block'; return; }
        if (!terms) { regError.textContent = 'Трябва да приемете условията.'; regError.style.display = 'block'; return; }
        // prepare payload
        const payload = { firstName: first, lastName: last, username: username, email: email, password: pw };

        const submitBtn = registerForm.querySelector('button[type="submit"]');
        const originalBtnText = submitBtn ? submitBtn.textContent : null;
        if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Изпращане…'; }

        // POST to API
        fetch('http://localhost:8080/api/createUser', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }).then(async (res) => {
          if (!res.ok) {
            const text = await res.text().catch(()=>null);
            throw new Error(text || ('HTTP ' + res.status));
          }
          return res.json().catch(()=>null);
        }).then((data) => {
          const createdUserId = data && (data.uuid || data.userId || data.id || data.user?.uuid || data.user?.userId || data.user?.id);
          if (createdUserId && window.KKCart) {
            window.KKCart.mergeGuestCartToUser(String(createdUserId)).catch((err) => console.warn('Cart merge failed', err));
          }
          // success
          alert('Профилът е създаден успешно.');
          registerForm.reset();
          window.location.href = 'loginPage.html';
        }).catch((err) => {
          regError.textContent = 'Грешка при регистрация: ' + (err.message || err);
          regError.style.display = 'block';
        }).finally(() => {
          if (submitBtn) { submitBtn.disabled = false; if (originalBtnText) submitBtn.textContent = originalBtnText; }
        });
      });
    }
  </script>
</body>
</html>
