<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Мъже — K&K Clothing</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Montserrat',sans-serif;background:#000;color:#fff;line-height:1.6}
    a{text-decoration:none;color:inherit}
    .container{width:90%;max-width:1200px;margin:0 auto}

    header{display:flex;justify-content:space-between;align-items:center;padding:22px;background:linear-gradient(180deg,rgba(0,0,0,0.6),rgba(0,0,0,0.35));border-bottom:1px solid rgba(255,255,255,0.03);position:sticky;top:0;z-index:99}
    .logo{font-weight:800;color:#DC143C;font-size:1.8em;letter-spacing:2px}
    nav{display:flex;align-items:center;gap:16px}
    nav ul{display:flex;list-style:none;gap:14px;align-items:center}
    nav a,.dropdown-toggle{padding:6px 8px;border-radius:8px;font-weight:600;color:rgba(255,255,255,0.92)}
    nav a:hover,.dropdown-toggle:hover{background:rgba(255,255,255,0.02);color:#fff}

    /* Cart & profile actions in nav */
    .nav-actions{display:flex;align-items:center;gap:10px;margin-left:6px}
    .nav-actions a{display:inline-flex;align-items:center;justify-content:center;padding:8px;border-radius:8px;color:rgba(255,255,255,0.92);font-weight:700}
    .nav-actions a:hover{background:rgba(255,255,255,0.02);color:#fff}

    .dropdown{position:relative}
    .dropdown-toggle{background:transparent;border:none;cursor:pointer}
    .dropdown-toggle:after{content:'▾';margin-left:6px;font-size:.72em}
    .dropdown-menu{position:absolute;top:calc(100% + 8px);left:0;min-width:160px;background:#0b0b0b;border:1px solid rgba(255,255,255,0.04);border-radius:10px;display:none;flex-direction:column;padding:6px 0;box-shadow:0 12px 40px rgba(0,0,0,0.6);z-index:1000}
    .dropdown.open .dropdown-menu{display:flex}
    .dropdown-menu a{padding:10px 14px;color:#e6e6e6;font-weight:600}
    .dropdown-menu a:hover{background:rgba(255,255,255,0.02);color:#fff}

    .search-container{display:flex;align-items:center;background:rgba(255,255,255,0.02);padding:6px 8px;border-radius:999px}
    .search-input{width:0;padding:8px 12px;border:none;border-radius:999px;background:transparent;color:#fff;outline:none;transition:width .28s}
    .search-input.active{width:210px}
    .search-icon{cursor:pointer;margin-left:8px}

    .hero{min-height:34vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:46px 20px;background:linear-gradient(180deg,rgba(0,0,0,0.6),rgba(0,0,0,0.6));}
    .hero h1{font-size:2.4rem;margin-bottom:6px}
    .hero p{color:#cfcfcf}

    .products { padding:48px 20px; background:linear-gradient(180deg,#080808,#0b0b0b) }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:20px; max-width:1200px; margin:0 auto }

    .product-card { background: linear-gradient(180deg,#fafafa,#f7f7f7); border-radius:12px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.12); border:1px solid rgba(0,0,0,0.04); transition:transform .25s }
    .product-card:hover { transform: translateY(-8px); box-shadow:0 20px 50px rgba(0,0,0,0.22) }
    .product-image { height:240px; background-size:cover; background-position:center; transition:transform .4s }
    .product-card:hover .product-image { transform:scale(1.05) }

    .product-info { padding:14px; text-align:center }
    .product-info h4 { color:#222; margin-bottom:6px }
    .product-info p { color:#555; font-size:0.95em; margin-bottom:8px }
    .price { font-weight:700; color:#DC143C }
    .btn { padding:10px 16px; border-radius:999px; border:none; background:linear-gradient(90deg,#ff7b86,#DC143C); color:#fff; cursor:pointer; font-weight:700 }

    footer{padding:40px 20px;background:linear-gradient(180deg,#070707,#0b0b0b);color:#cfcfcf}
    footer .footer-top{display:flex;justify-content:space-between;align-items:center;gap:20px;max-width:1200px;margin:0 auto 16px}
    footer .logo{color:#DC143C}
    footer .footer-bottom{text-align:center;color:#9e9e9e;font-size:0.9em}

    @media(max-width:640px){ .hero{padding:36px 16px} .product-image{height:180px} }
  </style>
</head>
<body>
  <header>
    <div class="logo">K&K</div>
    <nav>
      <ul>
        <li><a href="startingPage.html">Начало</a></li>
        <li class="dropdown">
          <button class="dropdown-toggle" id="clothesToggle" aria-expanded="false" aria-controls="clothesMenu">Дрехи</button>
          <div class="dropdown-menu" id="clothesMenu" role="menu" aria-labelledby="clothesToggle">
            <a href="menClothing.html" role="menuitem">Мъже</a>
            <a href="womenClothing.html" role="menuitem">Жени</a>
            <a href="kidsClothing.html" role="menuitem">Деца</a>
          </div>
        </li>
        <li><a href="contact.html">Контакт</a></li>
        <li><a href="aboutUs.html">За нас</a></li>
      </ul>

      <div class="nav-actions" aria-hidden="false">
        <a href="cart.html" class="icon-link" title="Кошница" aria-label="Кошница">🛒</a>
        <a href="profile.html" class="icon-link" title="Профил" aria-label="Профил">👤</a>
      </div>

      <div class="search-container">
        <input class="search-input" placeholder="Търси...">
        <div class="search-icon" id="searchToggle" title="Търси">🔍</div>
      </div>
    </nav>
  </header>

  <section class="hero">
    <div class="container">
      <h1>Мъжка колекция</h1>
      <p>Открий стилови предложения за всеки ден — модерно и комфортно.</p>
    </div>
  </section>

  <section class="products">
    <div class="container">
      <h2 style="margin-bottom:18px">Популярни артикули</h2>
      <div class="grid" id="productGrid"></div>
    </div>
  </section>

  <footer>
    <div class="footer-top container">
      <div class="logo">K&K</div>
      <div>
        <h4 style="margin-bottom:8px;color:#fff">Бързи връзки</h4>
        <ul style="list-style:none;color:#d9d9d9;padding-left:0;line-height:1.8">
          <li><a href="startingPage.html">Начало</a></li>
          <li><a href="contact.html">Контакт</a></li>
          <li><a href="aboutUs.html">За нас</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom container">&copy; 2024 K&К Clothing. Всички права запазени.</div>
  </footer>

  <script src="cartApi.js"></script>
  <script>
    const searchToggle = document.getElementById('searchToggle');
    const searchInput = document.querySelector('.search-input');
    if (searchToggle) { searchToggle.addEventListener('click', ()=>{ searchInput.classList.toggle('active'); if (searchInput.classList.contains('active')) searchInput.focus(); else searchInput.value=''; }); }

    const clothesToggle = document.getElementById('clothesToggle');
    if (clothesToggle) { clothesToggle.addEventListener('click', ()=>{ const parent = clothesToggle.parentElement; const isOpen = parent.classList.toggle('open'); clothesToggle.setAttribute('aria-expanded', isOpen); });
      document.addEventListener('click', (e)=>{ const dropdown = document.querySelector('.dropdown'); if (!dropdown) return; if (!dropdown.contains(e.target)) { dropdown.classList.remove('open'); clothesToggle.setAttribute('aria-expanded','false'); } });
      document.addEventListener('keydown',(e)=>{ if (e.key==='Escape'){ const dropdown=document.querySelector('.dropdown'); if (dropdown){ dropdown.classList.remove('open'); clothesToggle.setAttribute('aria-expanded','false'); clothesToggle.focus(); } } }); }

    (function() {
      const BGN_TO_EUR = 1.95583;
      document.querySelectorAll('.price[data-bgn]').forEach(el => {
        const bgn = parseFloat(el.getAttribute('data-bgn')) || 0;
        const eur = (bgn / BGN_TO_EUR);
        const span = el.querySelector('.price-eur');
        if (span) span.textContent = ' — ' + eur.toFixed(2) + ' €';
      });
    })();

    async function loadProducts() {
      const grid = document.getElementById('productGrid');
      if (!grid) return;

      try {
        const response = await fetch('http://localhost:8080/api/getAllProductData', {
          method: 'GET'
        });

        if (!response.ok) {
          const errorText = await response.text();
          console.error('Products request failed:', response.status, errorText);
          throw new Error(`Failed to load products (${response.status})`);
        }

        const payload = await response.json();
        const products = Array.isArray(payload)
          ? payload
          : payload.products || payload.data || payload.content || payload.result || [];

        if (!Array.isArray(products)) {
          throw new Error('Unexpected products response format');
        }

        grid.innerHTML = '';

        products.forEach((product) => {
          const card = document.createElement('div');
          card.className = 'product-card';
          card.dataset.productId = product.id;

          const imageUrl = product.imageUrl || product.image || product.img || product.imagePath || 'https://via.placeholder.com/600x800?text=No+Image';
          const price = Number(product.price || 0);
          const name = product.name || product.title || 'Продукт';
          const description = product.description || product.shortDescription || '';

          card.innerHTML = `
            <a href="product.html?id=${encodeURIComponent(product.id)}">
              <div class="product-image" style="background-image:url('${imageUrl}')"></div>
            </a>
            <div class="product-info">
              <a href="product.html?id=${encodeURIComponent(product.id)}">
                <h4>${name}</h4>
              </a>
              <p>${description}</p>
              <div class="price" data-bgn="${price}">${price.toFixed(2)} лв. <span class="price-eur"></span></div>
              <div style="margin-top:10px">
                <button class="btn" data-product-id="${product.id}">Добави в кошницата</button>
              </div>
            </div>
          `;

          const button = card.querySelector('.btn');
          button.addEventListener('click', () => {
            if (!window.KKCart) {
              console.error('Cart API is not available');
              return;
            }

            const productToCart = {
              productId: String(product.id),
              name: name,
              price: price,
              quantity: 1,
              size: 'M'
            };

            window.KKCart.addCartItem(productToCart)
              .then(() => {
                button.textContent = 'Добавено';
                setTimeout(() => { button.textContent = 'Добави в кошницата'; }, 1200);
              })
              .catch((err) => {
                console.error(err);
                alert('Неуспешно добавяне в кошницата.');
              });
          });

          grid.appendChild(card);
        });
      } catch (err) {
        console.error(err);
        grid.innerHTML = '<p style="color:#ff9aa6">Неуспешно зареждане на продукти.</p>';
      }
    }

    loadProducts();
  </script>
</body>
</html>
